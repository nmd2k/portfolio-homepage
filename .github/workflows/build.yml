name: Build and package

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Pack static site (tar.gz)
        run: tar czvf site-static.tar.gz -C dist .

      - name: Upload site archive
        uses: actions/upload-artifact@v4
        with:
          name: site-static
          path: site-static.tar.gz
          retention-days: 90
