name: Build and Release Static Site

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Create archive
        run: |
          cd dist
          tar -czvf ../student-notebook-build.tar.gz .
          cd ..

      - name: Generate release tag
        id: tag
        run: |
          echo "release_tag=build-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Release ${{ steps.tag.outputs.release_tag }}
          files: student-notebook-build.tar.gz
          body: |
            Automated build of the static site.

            To deploy on your edge machine, run:
            ```bash
            # Download the latest release
            curl -L -o site.tar.gz https://github.com/${{ github.repository }}/releases/latest/download/student-notebook-build.tar.gz

            # Extract to your web server directory (e.g., /var/www/html)
            mkdir -p /var/www/html
            tar -xzvf site.tar.gz -C /var/www/html
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
