bio:
  section_title: "BIO_LOG"
  # Easier authoring format for BIO:
  # - **bold text**
  # - [link text](https://example.com)
  # - plain line breaks
  markdown:
    - "I am currently pursuing my PhD at the University of Melbourne (ranked 19* worldwide), under the supervision of [Dr. Bach Le Dinh Xuan](https://xuanbachle.github.io/) and [Dr. Van-Thuan Pham](https://thuanpv.github.io/). Previously, I graduated with a Bachelor's degree in Computer Science from Vietnam National University in 2022, where I was supervised by [Dr. Tran Quoc Long](https://scholar.google.com/citations?user=tnDavuYAAAAJ&hl=en), Director of the Institute for Artificial Intelligence."
    - "From 2022 to 2025, I joined the **AI Residency Program** at the FPT AI Center, working alongside outstanding young researchers across Vietnam. With invaluable mentorship from [Dr. Nghi Bui](https://bdqnghi.github.io/) (Salesforce Senior Scientist; Product Owner & Lab Manager at FPT Software) and [Dr. Quang Pham](https://sites.google.com/view/quangpham93) (Research Scientist at A*STAR), I published research papers at leading international conferences, including ICLR, EMNLP, and NAACL."
    # - "Beyond academia, I am an active contributor to open-source projects and always welcome opportunities for collaboration. The best way to reach me is via email."

